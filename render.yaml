      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── 5. Citation Agent ───────────────────────────────────────
  - type: web
    name: orchestrix-citation
    env: python
